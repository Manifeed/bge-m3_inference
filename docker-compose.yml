services:
  bge-m3_inference:
    build:
      context: .
      dockerfile: Dockerfile
      provenance: false
      sbom: false
    container_name: ${BGE_M3_INFERENCE_CONTAINER_NAME:-bge-m3_inference}
    ports:
      - "${BGE_M3_INFERENCE_PORT:-8000}:8000"
    environment:
      BGE_M3_INFERENCE_API_KEY: ${BGE_M3_INFERENCE_API_KEY:-}
      SOURCE_EMBEDDING_MODEL_PATH: ${SOURCE_EMBEDDING_MODEL_PATH:-/opt/models/bge-m3}
      BGE_M3_INFERENCE_BATCH_MAX_ITEMS: ${BGE_M3_INFERENCE_BATCH_MAX_ITEMS:-64}
      BGE_M3_INFERENCE_BATCH_MAX_TOKENS: ${BGE_M3_INFERENCE_BATCH_MAX_TOKENS:-16384}
      BGE_M3_INFERENCE_BATCH_MAX_WAIT_MS: ${BGE_M3_INFERENCE_BATCH_MAX_WAIT_MS:-5}
      BGE_M3_INFERENCE_QUEUE_MAX_ITEMS: ${BGE_M3_INFERENCE_QUEUE_MAX_ITEMS:-1024}
      BGE_M3_INFERENCE_MAX_LENGTH: ${BGE_M3_INFERENCE_MAX_LENGTH:-512}
      BGE_M3_INFERENCE_REQUEST_TIMEOUT_SECONDS: ${BGE_M3_INFERENCE_REQUEST_TIMEOUT_SECONDS:-300}
      BGE_M3_INFERENCE_SHUTDOWN_GRACE_SECONDS: ${BGE_M3_INFERENCE_SHUTDOWN_GRACE_SECONDS:-30}
      BGE_M3_INFERENCE_USE_FP16: ${BGE_M3_INFERENCE_USE_FP16:-true}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
    gpus: all
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/internal/health').read()\"",
        ]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 5
